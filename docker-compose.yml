services:
  timelapse-controller:
    build: .
    image: vshie/blueos-timelapse-controller:dev
    container_name: blueos-timelapse-controller
    ports:
      - "9876:9876"
    volumes:
      - ./data:/data
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    environment:
      - TIMELAPSE_DATA_DIR=/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
